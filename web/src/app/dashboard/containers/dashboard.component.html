<div *ngIf="isLoading" class="fixed inset-0 flex items-center justify-center z-50 bg-gray-100">
  <div class="text-center">
    <svg class="animate-spin h-12 w-12 text-violet-700 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <p class="mt-3 text-gray-700">Carregando dashboard...</p>
  </div>
</div>

<div *ngIf="!isLoading" class="app-wrapper min-h-screen flex w-screen overflow-x-hidden">
  <app-sidebar
    (closeMenuClick)="onMenuClick()"
    [isExpanded]="sidebarExpanded"
  ></app-sidebar>

  <div class="content-wrapper w-full flex flex-col bg-slate-50 border-l">
    <app-header
      (menuClick)="onMenuClick()"
      [sidebarExpanded]="sidebarExpanded"
    ></app-header>

    <main style="height: 100%">
      <router-outlet></router-outlet>
    </main>

    <app-footer class="mt-auto"></app-footer>
  </div>

  <div
    *ngIf="sidebarExpanded"
    class="z-10 md:hidden fixed top-0 left-0 w-screen min-h-screen bg-black bg-opacity-50"
  ></div>
</div>
