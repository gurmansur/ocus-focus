<section>
  <div class="container px-5 py-24 mx-auto">
    <form
      class="border-l-4 border-violet-700 rounded-lg md:w-1/2 mx-auto flex flex-col items-center shadow-lg p-10"
      [formGroup]="signinFormGroup"
      (submit)="onSubmit()"
    >
      <div class="rounded-full bg-violet-700 p-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="ws-10 h-10 text-white font-black"
        >
          <path
            fillRule="evenodd"
            d="M14.447 3.027a.75.75 0 01.527.92l-4.5 16.5a.75.75 0 01-1.448-.394l4.5-16.5a.75.75 0 01.921-.526zM16.72 6.22a.75.75 0 011.06 0l5.25 5.25a.75.75 0 010 1.06l-5.25 5.25a.75.75 0 11-1.06-1.06L21.44 12l-4.72-4.72a.75.75 0 010-1.06zm-9.44 0a.75.75 0 010 1.06L2.56 12l4.72 4.72a.75.75 0 11-1.06 1.06L.97 12.53a.75.75 0 010-1.06l5.25-5.25a.75.75 0 011.06 0z"
            clipRule="evenodd"
          />
        </svg>
      </div>
      <h2 class="my-4 text-xl text-center">
        Efetuar Login como
        <span class="font-medium text-violet-700">Colaborador</span>
      </h2>
      
      <!-- Error message -->
      <div *ngIf="errorMessage" class="w-full mb-4 p-3 bg-red-100 text-red-700 rounded text-sm">
        {{ errorMessage }}
      </div>
      
      <div class="relative mb-4 w-full">
        <label for="email" class="leading-7 text-sm text-gray-600"
          >Endereço de email</label
        >
        <input
          required
          formControlName="email"
          type="email"
          id="email"
          name="email"
          class="w-full bg-gray-50 rounded border border-gray-300 focus:border-violet-700 focus:ring-2 focus:ring-indigo-200 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out"
          [class.border-red-500]="email?.invalid && email?.touched"
        />
        <div *ngIf="email?.invalid && email?.touched" class="text-red-500 text-xs mt-1">
          <span *ngIf="email?.errors?.['required']">Email é obrigatório</span>
          <span *ngIf="email?.errors?.['email']">Email deve ser válido</span>
          <span *ngIf="email?.errors?.['minlength']">Email deve ter pelo menos 5 caracteres</span>
        </div>
      </div>
      <div class="relative mb-4 w-full">
        <label for="password" class="leading-7 text-sm text-gray-600"
          >Senha</label
        >
        <input
          required
          formControlName="senha"
          type="password"
          id="password"
          name="password"
          class="w-full bg-gray-50 rounded border border-gray-300 focus:border-violet-700 focus:ring-2 focus:ring-indigo-200 text-base outline-none text-gray-700 py-1 px-3 leading-8 transition-colors duration-200 ease-in-out"
          [class.border-red-500]="senha?.invalid && senha?.touched"
        />
        <div *ngIf="senha?.invalid && senha?.touched" class="text-red-500 text-xs mt-1">
          <span *ngIf="senha?.errors?.['required']">Senha é obrigatória</span>
          <span *ngIf="senha?.errors?.['minlength']">Senha deve ter pelo menos 5 caracteres</span>
        </div>
      </div>
      <button
        class="inline-flex items-center font-medium bg-violet-600 border-0 rounded p-3 w-1/3 justify-center focus:outline-none hover:bg-violet-800 text-white mt-4"
        [disabled]="isLoading || signinFormGroup.invalid"
      >
        <span *ngIf="!isLoading">Efetuar Login</span>
        <span *ngIf="isLoading" class="flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Processando...
        </span>
      </button>
      <p class="text-gray-700 text-center text-sm mt-6 font-light">
        Ainda não possui um cadastro?
        <a href="/signup" class="text-violet-700 font-medium"
          >Crie já sua conta clicando aqui.</a
        >
      </p>
    </form>
  </div>
</section>
